<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle of the Cosmics</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #ui-layer { position: fixed; top: 10px; left: 10px; color: orange; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        .hidden { display: none !important; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 20; }
        button { 
            padding: 15px 25px; background: rgba(50, 50, 50, 0.9); color: orange; border: 2px solid orange; 
            border-radius: 8px; font-weight: bold; pointer-events: auto; font-size: 16px;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <h2 id="role-text">BATTLE OF THE COSMICS</h2>
    <p id="status-text">Connecting to Firebase...</p>
</div>

<!-- Mobile Runner Controls -->
<div id="mobile-runner" class="controls hidden">
    <button ontouchstart="moveDir=-1" ontouchend="moveDir=0">LEFT</button>
    <button onclick="jump()">JUMP</button>
    <button ontouchstart="moveDir=1" ontouchend="moveDir=0">RIGHT</button>
</div>

<!-- Mobile Sniper Controls -->
<div id="mobile-sniper" class="controls hidden">
    <button onclick="cast('Lightning')">⚡ STRIKE (1)</button>
    <button onclick="cast('Wind')">🌪️ GUST (2)</button>
</div>

<script>
// --- 1. FIREBASE CONFIG ---
const firebaseConfig = {
    databaseURL: "https://chaosbridge21-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const myID = "p_" + Math.random().toString(36).substr(2, 5);
const playerRef = db.ref("players/" + myID);
const actionRef = db.ref("global_action");

let scene, player, crosshair, platforms;
let myRole = "loading";
let remotePlayers = {};
let moveDir = 0;
let isTouchingUI = false;
let lastSentX = 0, lastSentY = 0;

// --- 2. PHASER GAME ENGINE ---
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { gravity: { y: 1500 }, debug: false } },
    scene: { create, update }
};
const game = new Phaser.Game(config);

function create() {
    scene = this;
    this.cameras.main.setBackgroundColor('#1a1a1a');
    
    platforms = this.physics.add.staticGroup();
    
    // Fix: Create rectangle first, then add to physics
    let floorRect = this.add.rectangle(1000, 1850, 4000, 100, 0x333333);
    this.physics.add.existing(floorRect, true); 
    platforms.add(floorRect);

    // Sniper Crosshair: Hollow Orange Circle
    crosshair = this.add.circle(0, 0, 30).setStrokeStyle(3, 0xffa500).setDepth(100).setVisible(false);

    // Player Model: Solid Square
    player = this.add.rectangle(200, 1700, 40, 40, 0xff6666);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    assignRole();
}

function assignRole() {
    db.ref('players').once('value').then((snap) => {
        const data = snap.val() || {};
        const count = Object.keys(data).length;

        if (count === 0) {
            myRole = "sniper";
            document.getElementById('mobile-sniper').classList.remove('hidden');
            crosshair.setVisible(true);
            player.setVisible(false);
            player.body.setAllowGravity(false);
        } else {
            myRole = "runner";
            document.getElementById('mobile-runner').classList.remove('hidden');
            scene.cameras.main.startFollow(player, true, 0.1, 0.1);
        }

        document.getElementById('role-text').innerText = "ROLE: " + myRole.toUpperCase();
        document.getElementById('status-text').innerText = "ID: " + myID;
        
        initNetworking();
    });
}

function initNetworking() {
    playerRef.onDisconnect().remove();
    playerRef.set({ x: 200, y: 1700 });

    db.ref('players').on('value', (snap) => {
        const all = snap.val() || {};
        const ids = Object.keys(all);
        
        // Cleanup Ghosts
        Object.keys(remotePlayers).forEach(id => {
            if (!ids.includes(id)) {
                remotePlayers[id].destroy();
                delete remotePlayers[id];
            }
        });

        // Update Remote Players
        ids.forEach(id => {
            if (id !== myID) {
                if (!remotePlayers[id]) {
                    remotePlayers[id] = scene.add.rectangle(0, 0, 40, 40, 0x00ccff);
                }
                remotePlayers[id].targetX = all[id].x;
                remotePlayers[id].targetY = all[id].y;
            }
        });
    });

    actionRef.on('value', (snap) => {
        const act = snap.val();
        if (act && act.t > (window.lastActT || 0)) {
            window.lastActT = act.t;
            handleEffect(act);
        }
    });
}

function update() {
    if (myRole === "runner") {
        const keys = this.input.keyboard.createCursorKeys();
        if (keys.left.isDown || moveDir === -1) player.body.setVelocityX(-500);
        else if (keys.right.isDown || moveDir === 1) player.body.setVelocityX(500);
        else player.body.setVelocityX(0);

        if (Phaser.Input.Keyboard.JustDown(keys.up) && player.body.touching.down) jump();

        if (Math.abs(player.x - lastSentX) > 2 || Math.abs(player.y - lastSentY) > 2) {
            playerRef.update({ x: Math.round(player.x), y: Math.round(player.y) });
            lastSentX = player.x; lastSentY = player.y;
        }
    }

    if (myRole === "sniper") {
        const keys = this.input.keyboard.addKeys('ONE,TWO,W,A,S,D');
        if (Phaser.Input.Keyboard.JustDown(keys.ONE)) cast('Lightning');
        if (Phaser.Input.Keyboard.JustDown(keys.TWO)) cast('Wind');

        if (keys.A.isDown) scene.cameras.main.scrollX -= 10;
        if (keys.D.isDown) scene.cameras.main.scrollX += 10;
        if (keys.W.isDown) scene.cameras.main.scrollY -= 10;
        if (keys.S.isDown) scene.cameras.main.scrollY += 10;

        const pointer = this.input.activePointer;
        if (pointer.isDown && !isTouchingUI) {
            if (pointer.wasTouch) {
                scene.cameras.main.scrollX -= (pointer.position.x - pointer.prevPosition.x);
                scene.cameras.main.scrollY -= (pointer.position.y - pointer.prevPosition.y);
            }
            let worldPoint = pointer.positionToCamera(scene.cameras.main);
            crosshair.setPosition(worldPoint.x, worldPoint.y);
            playerRef.update({ x: Math.round(worldPoint.x), y: Math.round(worldPoint.y) });
        }
    }

    Object.values(remotePlayers).forEach(rp => {
        rp.x = Phaser.Math.Linear(rp.x, rp.targetX || rp.x, 0.2);
        rp.y = Phaser.Math.Linear(rp.y, rp.targetY || rp.y, 0.2);
    });
}

function jump() {
    if (player.body && player.body.touching.down) player.body.setVelocityY(-900);
}

function cast(type) {
    isTouchingUI = true;
    let worldPoint = scene.input.activePointer.positionToCamera(scene.cameras.main);
    actionRef.set({ type, x: Math.round(worldPoint.x), y: Math.round(worldPoint.y), t: Date.now() });
    setTimeout(() => { isTouchingUI = false; }, 200);
}

function handleEffect(act) {
    if (act.type === "Lightning") {
        let beam = scene.add.rectangle(act.x, act.y - 1000, 15, 2000, 0xffffff);
        scene.tweens.add({ targets: beam, alpha: 0, duration: 300, onComplete: () => beam.destroy() });
        if (myRole === "runner" && Math.abs(player.x - act.x) < 30) {
            player.setPosition(200, 1700);
        }
    }
}
</script>
</body>
</html>
