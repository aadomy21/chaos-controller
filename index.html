<!DOCTYPE html>
<html>
<head>
    <title>Runner vs God: The Gauntlet</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { background: #0f0f0f; color: #00ff00; text-align: center; font-family: 'Courier New', Courier, monospace; }
        #game-container { margin: 10px auto; border: 4px solid #333; width: 800px; height: 400px; }
        .dashboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 800px; margin: 0 auto; }
        button { padding: 15px 5px; font-weight: bold; cursor: pointer; background: #222; color: #ff4444; border: 2px solid #ff4444; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #ff4444; color: white; }
    </style>
</head>
<body>
    <h1>RUNNER VS GOD</h1>
    <div id="game-container"></div>
    <div class="dashboard">
        <button onclick="sendChaos('Lightning')">LIGHTNING</button>
        <button onclick="sendChaos('Snipe')">SNIPE</button>
        <button onclick="sendChaos('Wind')">WIND GUST</button>
        <button onclick="sendChaos('Wall')">WALL SPAWN</button>
        <button onclick="sendChaos('Blind')">BLINDNESS</button>
    </div>

    <script>
        const dbURL = "https://chaosbridge21-default-rtdb.europe-west1.firebasedatabase.app/chaos.json";

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 400,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1000 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        let player, platforms, lastHandled = 0, cursors;

        function preload() {
            this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
            this.load.image('player', 'https://labs.phaser.io/assets/sprites/blue_ball.png');
            this.load.image('bolt', 'https://labs.phaser.io/assets/sprites/fleshlight.png'); // Lightning proxy
        }

        function create() {
            // Platforms
            platforms = this.physics.add.staticGroup();
            platforms.create(400, 380, 'ground').setScale(2).refreshBody();
            platforms.create(600, 250, 'ground');

            // Player
            player = this.physics.add.sprite(50, 300, 'player');
            player.setBounce(0.1).setCollideWorldBounds(true);
            this.physics.add.collider(player, platforms);

            cursors = this.input.keyboard.createCursorKeys();

            // Bridge Listener
            setInterval(() => {
                fetch(dbURL).then(r => r.json()).then(data => {
                    if (data && data.timestamp > lastHandled) {
                        executeAbility(this, data.command);
                        lastHandled = data.timestamp;
                    }
                });
            }, 300);
        }

        function executeAbility(scene, cmd) {
            if (cmd === 'Lightning') {
                let strike = scene.add.rectangle(player.x, 200, 40, 400, 0xffff00);
                scene.tweens.add({ targets: strike, alpha: 0, duration: 500 });
                if (Math.abs(player.x - strike.x) < 30) player.setPosition(50, 300); // Reset player
            }
            if (cmd === 'Wind') {
                player.body.setVelocityX(-1000);
            }
            if (cmd === 'Blind') {
                let overlay = scene.add.rectangle(400, 200, 800, 400, 0x000000).setAlpha(0.9);
                setTimeout(() => overlay.destroy(), 3000);
            }
            if (cmd === 'Wall') {
                let wall = platforms.create(player.x + 100, 300, 'ground').setScale(0.2, 2).refreshBody();
                setTimeout(() => wall.destroy(), 2000);
            }
        }

        function update() {
            if (cursors.left.isDown) player.setVelocityX(-200);
            else if (cursors.right.isDown) player.setVelocityX(200);
            else player.setVelocityX(0);
            if (cursors.up.isDown && player.body.touching.down) player.setVelocityY(-600);
        }

        function sendChaos(effect) {
            fetch(dbURL, {
                method: 'PUT',
                body: JSON.stringify({ command: effect, timestamp: Date.now() })
            });
        }
    </script>
</body>
</html>
