<!DOCTYPE html>
<html>
<head>
    <title>Runner vs God</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { background: #111; color: #0f0; text-align: center; margin: 0; }
        #game-container { margin: 20px auto; width: 800px; height: 400px; border: 2px solid #555; }
    </style>
</head>
<body>
    <h2 id="status">LOADING ENGINE...</h2>
    <div id="game-container"></div>
    
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 400,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1000 } } },
            scene: { create: create, update: update }
        };

        let player, keys;
        const game = new Phaser.Game(config);

        function create() {
            document.getElementById('status').innerText = "GAME LIVE: USE WASD TO MOVE";

            // Floor
            let ground = this.add.rectangle(400, 380, 800, 40, 0x00ff00);
            this.physics.add.existing(ground, true);

            // Player
            player = this.add.rectangle(100, 300, 30, 30, 0xff0000);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            
            this.physics.add.collider(player, ground);

            keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT');
        }

        function update() {
            if (!player) return;
            
            if (keys.A.isDown || keys.LEFT.isDown) player.body.setVelocityX(-200);
            else if (keys.D.isDown || keys.RIGHT.isDown) player.body.setVelocityX(200);
            else player.body.setVelocityX(0);

            if ((keys.W.isDown || keys.UP.isDown) && player.body.touching.down) {
                player.body.setVelocityY(-500);
            }
        }
    </script>
</body>
</html>
