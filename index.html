<!DOCTYPE html>
<html>
<head>
    <title>Battle of the Cosmics</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #ui-layer { position: fixed; top: 10px; left: 10px; color: orange; z-index: 10; pointer-events: none; }
        .hidden { display: none !important; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 20; }
        button { 
            padding: 15px 25px; background: #333; color: orange; border: 2px solid orange; 
            border-radius: 8px; font-weight: bold; pointer-events: auto;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <h2 id="role-text">BATTLE OF THE COSMICS</h2>
    <p id="status-text">Connecting to Firebase...</p>
</div>

<!-- Mobile Runner Controls -->
<div id="mobile-runner" class="controls hidden">
    <button ontouchstart="moveDir=-1" ontouchend="moveDir=0">LEFT</button>
    <button onclick="jump()">JUMP</button>
    <button ontouchstart="moveDir=1" ontouchend="moveDir=0">RIGHT</button>
</div>

<!-- Mobile Sniper Controls -->
<div id="mobile-sniper" class="controls hidden">
    <button onclick="cast('Lightning')">LIT (1)</button>
    <button onclick="cast('Wind')">WIND (2)</button>
</div>

<script>
// --- CONFIG & FIREBASE ---
const firebaseConfig = {
    databaseURL: "https://chaosbridge21-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const myID = "p_" + Math.random().toString(36).substr(2, 5);
const playerRef = db.ref("players/" + myID);
const actionRef = db.ref("global_action");

let scene, player, crosshair;
let myRole = "loading";
let remotePlayers = {};
let moveDir = 0;
let isTouchingUI = false;
let lastSentX = 0;

// --- GAME ENGINE ---
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { gravity: { y: 1500 } } },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

function preload() {}

function create() {
    scene = this;
    
    // Simple Floor
    let platforms = this.physics.add.staticGroup();
    let floor = this.add.rectangle(1000, 1850, 4000, 100, 0x333333);
    platforms.add(floor);

    // Sniper Crosshair (Hollow Orange Circle)
    crosshair = this.add.circle(0, 0, 30).setStrokeStyle(3, 0xffa500).setDepth(100).setVisible(false);

    // Player Model (Square)
    player = this.physics.add.rectangle(200, 1700, 40, 40, 0xff6666);
    this.physics.add.collider(player, platforms);

    assignRole();
    initNetworking();
}

function assignRole() {
    // Basic logic: First person is Sniper, others are Runners
    db.ref('players').once('value', (snap) => {
        if (!snap.exists()) {
            myRole = "sniper";
            document.getElementById('mobile-sniper').classList.remove('hidden');
            crosshair.setVisible(true);
            player.setVisible(false); // Sniper is invisible
            player.body.setAllowGravity(false);
        } else {
            myRole = "runner";
            document.getElementById('mobile-runner').classList.remove('hidden');
        }
        document.getElementById('role-text').innerText = "ROLE: " + myRole.toUpperCase();
        document.getElementById('status-text').innerText = "ID: " + myID;
    });
}

function initNetworking() {
    playerRef.onDisconnect().remove();

    db.ref('players').on('value', (snap) => {
        const all = snap.val() || {};
        const ids = Object.keys(all);
        
        // Clean Ghost Players
        Object.keys(remotePlayers).forEach(id => {
            if (!ids.includes(id)) {
                remotePlayers[id].destroy();
                delete remotePlayers[id];
            }
        });

        ids.forEach(id => {
            if (id !== myID) {
                if (!remotePlayers[id]) {
                    // Remote players appear as blue squares
                    remotePlayers[id] = scene.add.rectangle(0, 0, 40, 40, 0x00ccff);
                }
                remotePlayers[id].targetX = all[id].x;
                remotePlayers[id].targetY = all[id].y;
            }
        });
    });

    actionRef.on('value', (snap) => {
        const act = snap.val();
        if (act && act.type === "Lightning") {
            let bolt = scene.add.rectangle(act.x, act.y - 500, 10, 1000, 0xffffff);
            scene.tweens.add({ targets: bolt, alpha: 0, duration: 200, onComplete: () => bolt.destroy() });
        }
    });
}

function update() {
    if (myRole === "runner") {
        const keys = this.input.keyboard.createCursorKeys();
        if (keys.left.isDown || moveDir === -1) player.setVelocityX(-500);
        else if (keys.right.isDown || moveDir === 1) player.setVelocityX(500);
        else player.setVelocityX(0);

        if (keys.up.isDown && player.body.touching.down) jump();

        if (Math.abs(player.x - lastSentX) > 2) {
            playerRef.update({ x: Math.round(player.x), y: Math.round(player.y) });
            lastSentX = player.x;
        }
    }

    if (myRole === "sniper") {
        // PC Number Keys
        const keys = this.input.keyboard.addKeys('ONE,TWO');
        if (Phaser.Input.Keyboard.JustDown(keys.ONE)) cast('Lightning');
        if (Phaser.Input.Keyboard.JustDown(keys.TWO)) cast('Wind');

        const pointer = this.input.activePointer;
        if (pointer.isDown && !isTouchingUI) {
            if (pointer.wasTouch) { // Drag Camera on Mobile
                scene.cameras.main.scrollX -= (pointer.position.x - pointer.prevPosition.x);
                scene.cameras.main.scrollY -= (pointer.position.y - pointer.prevPosition.y);
            }
            let worldPoint = pointer.positionToCamera(scene.cameras.main);
            crosshair.setPosition(worldPoint.x, worldPoint.y);
            playerRef.update({ x: Math.round(worldPoint.x), y: Math.round(worldPoint.y) });
        }
    }

    // Smooth remote movement
    Object.values(remotePlayers).forEach(rp => {
        rp.x = Phaser.Math.Linear(rp.x, rp.targetX, 0.2);
        rp.y = Phaser.Math.Linear(rp.y, rp.targetY, 0.2);
    });
}

function jump() {
    if (player.body.touching.down) player.setVelocityY(-900);
}

function cast(type) {
    isTouchingUI = true;
    let worldPoint = scene.input.activePointer.positionToCamera(scene.cameras.main);
    actionRef.set({ type, x: Math.round(worldPoint.x), y: Math.round(worldPoint.y), t: Date.now() });
    setTimeout(() => { isTouchingUI = false; }, 150);
}
</script>
</body>
</html>
