<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper vs Runners: Multiplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; touch-action: none; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; font-family: monospace; z-index: 10; pointer-events: none; }
        .mobile-btn { position: fixed; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; z-index: 20; display: none; }
        #btn-left { bottom: 40px; left: 20px; }
        #btn-right { bottom: 40px; left: 100px; }
        #btn-jump { bottom: 40px; right: 20px; background: rgba(0,255,0,0.3); }
        .sniper-ui { position: fixed; top: 50%; right: 10px; transform: translateY(-50%); display: none; flex-direction: column; gap: 10px; z-index: 30; }
        button { padding: 10px; background: #ff4444; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="role-tag">ASSIGNING ROLE...</div>
        <div id="status">WAITING FOR PLAYERS...</div>
    </div>

    <!-- Mobile Buttons -->
    <div id="btn-left" class="mobile-btn"></div>
    <div id="btn-right" class="mobile-btn"></div>
    <div id="btn-jump" class="mobile-btn"></div>

    <!-- Sniper Controls -->
    <div id="sniper-controls" class="sniper-ui">
        <button onclick="sendAction('Lightning')">⚡ LIGHTNING</button>
        <button onclick="sendAction('Wind')">🌪️ GUST</button>
        <button onclick="sendAction('Wall')">🧱 WALL</button>
        <button onclick="sendAction('Blind')">🌑 BLIND</button>
    </div>

    <script>
        const dbURL = "https://chaosbridge21-default-rtdb.europe-west1.firebasedatabase.app/";
        const myID = "player_" + Math.floor(Math.random() * 10000);
        let myRole = "loading"; // runner or sniper
        let players = {};
        
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth, height: window.innerHeight,
            physics: { default: 'arcade', arcade: { gravity: { y: 1500 } } },
            scene: { preload: preload, create: create, update: update }
        };

        let sceneRef, player, platforms, keys, touchData = { left: false, right: false, jump: false };
        let crosshair, sniperTarget = { x: 0, y: 0 };
        const game = new Phaser.Game(config);

        function preload() {}

        async function create() {
            sceneRef = this;
            this.cameras.main.setBackgroundColor('#87CEEB');
            platforms = this.physics.add.staticGroup();

            // --- MAP DESIGN (POLISHED) ---
            // Layer 1 (Bottom)
            createRect(0, 1800, 3000, 60, 0x2ecc71); 
            // Stairs to Layer 2 (Fixed size)
            createRect(2800, 1650, 200, 40, 0x2ecc71);
            createRect(2600, 1500, 200, 40, 0x2ecc71);
            
            // Layer 2 (Middle)
            createRect(400, 1350, 2400, 60, 0x2ecc71);
            createRect(400, 1200, 200, 40, 0x2ecc71);
            createRect(600, 1050, 200, 40, 0x2ecc71);

            // Layer 3 (Top)
            createRect(800, 900, 2200, 60, 0x2ecc71);
            let finish = this.add.rectangle(2900, 840, 80, 80, 0xffff00);
            this.physics.add.existing(finish, true);

            // --- PLAYER ---
            player = this.add.rectangle(200, 1700, 40, 40, 0xff0000);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(false);
            this.physics.add.collider(player, platforms);
            
            // Sniper Crosshair (Visible to everyone)
            crosshair = this.add.circle(0, 0, 30, 0xff0000, 0.3).setStrokeStyle(2, 0xff0000);

            // --- MULTIPLAYER SETUP ---
            await assignRole();
            
            // Listen for Actions
            setInterval(syncWorld, 100);
            setInterval(updateMyPos, 50);

            keys = this.input.keyboard.addKeys('W,A,S,D,UP,LEFT,RIGHT');
            setupMobile();
        }

        async function assignRole() {
            const res = await fetch(dbURL + "players.json");
            const data = await res.json() || {};
            const count = Object.keys(data).length;
            
            myRole = (count === 0) ? "runner" : (count === 1) ? "runner" : "sniper";
            document.getElementById('role-tag').innerText = "ROLE: " + myRole.toUpperCase();
            
            if (myRole === "sniper") {
                document.getElementById('sniper-controls').style.display = 'flex';
                player.setVisible(false);
                player.body.setAllowGravity(false);
            } else {
                sceneRef.cameras.main.startFollow(player, true, 0.1, 0.1);
            }
        }

        function createRect(x, y, w, h, color) {
            let r = sceneRef.add.rectangle(x + w/2, y + h/2, w, h, color);
            sceneRef.physics.add.existing(r, true);
            platforms.add(r);
        }

        let jumpCount = 0;
        function update() {
            if (myRole === "loading") return;

            // --- SNIPER CAMERA CONTROL ---
            if (myRole === "sniper") {
                if (keys.A.isDown || keys.LEFT.isDown) sceneRef.cameras.main.scrollX -= 15;
                if (keys.D.isDown || keys.RIGHT.isDown) sceneRef.cameras.main.scrollX += 15;
                if (keys.W.isDown || keys.UP.isDown) sceneRef.cameras.main.scrollY -= 15;
                if (keys.S.isDown || keys.DOWN.isDown) sceneRef.cameras.main.scrollY += 15;
                
                // Track mouse for crosshair
                let worldPoint = sceneRef.input.activePointer.positionToCamera(sceneRef.cameras.main);
                updateSniperAim(worldPoint.x, worldPoint.y);
            }

            // --- RUNNER MOVEMENT ---
            if (myRole === "runner") {
                if (keys.A.isDown || keys.LEFT.isDown || touchData.left) player.body.setVelocityX(-450);
                else if (keys.D.isDown || keys.RIGHT.isDown || touchData.right) player.body.setVelocityX(450);
                else player.body.setVelocityX(0);

                if (player.body.touching.down) jumpCount = 0;

                // Double Jump Logic
                if (Phaser.Input.Keyboard.JustDown(keys.W) || Phaser.Input.Keyboard.JustDown(keys.UP) || touchData.jump) {
                    if (jumpCount < 2) {
                        player.body.setVelocityY(-800);
                        jumpCount++;
                        touchData.jump = false; 
                    }
                }
            }
        }

        // --- NETWORK SYNC ---
        function updateMyPos() {
            if (myRole === "runner") {
                fetch(`${dbURL}players/${myID}.json`, {
                    method: 'PUT',
                    body: JSON.stringify({ x: player.x, y: player.y, role: 'runner' })
                });
            }
        }

        function updateSniperAim(x, y) {
            fetch(`${dbURL}sniper.json`, {
                method: 'PUT',
                body: JSON.stringify({ x: x, y: y, timestamp: Date.now() })
            });
        }

        async function syncWorld() {
            const res = await fetch(dbURL + ".json");
            const data = await res.json();
            if (!data) return;

            // Sync other runners
            Object.keys(data.players || {}).forEach(id => {
                if (id !== myID) {
                    if (!players[id]) {
                        players[id] = sceneRef.add.rectangle(0, 0, 40, 40, 0x0000ff);
                    }
                    players[id].x = data.players[id].x;
                    players[id].y = data.players[id].y;
                }
            });

            // Sync Sniper Crosshair
            if (data.sniper) {
                crosshair.setPosition(data.sniper.x, data.sniper.y);
            }

            // Sync Sniper Actions
            if (data.action && data.action.timestamp > lastHandled) {
                handleAction(data.action);
                lastHandled = data.action.timestamp;
            }
        }

        function handleAction(act) {
            if (act.type === 'Lightning') {
                let warn = sceneRef.add.circle(act.x, act.y, 60, 0xffffff, 0.3);
                setTimeout(() => {
                    let beam = sceneRef.add.rectangle(act.x, act.y, 80, 2000, 0xffffff);
                    if (myRole === "runner" && Math.abs(player.x - act.x) < 50) {
                        player.body.reset(200, 1700); // Survivable: only resets pos
                    }
                    setTimeout(() => { beam.destroy(); warn.destroy(); }, 200);
                }, 500); // 0.5s Warning
            }
            if (act.type === 'Wind' && myRole === 'runner') {
                player.body.setVelocityX(-3000); // Buffed Wind
            }
        }

        function sendAction(type) {
            let worldPoint = sceneRef.input.activePointer.positionToCamera(sceneRef.cameras.main);
            fetch(`${dbURL}action.json`, {
                method: 'PUT',
                body: JSON.stringify({ type: type, x: worldPoint.x, y: worldPoint.y, timestamp: Date.now() })
            });
        }

        function setupMobile() {
            if (sceneRef.sys.game.device.os.desktop) return;
            document.querySelectorAll('.mobile-btn').forEach(b => b.style.display = 'block');
            
            document.getElementById('btn-left').ontouchstart = () => touchData.left = true;
            document.getElementById('btn-left').ontouchend = () => touchData.left = false;
            document.getElementById('btn-right').ontouchstart = () => touchData.right = true;
            document.getElementById('btn-right').ontouchend = () => touchData.right = false;
            document.getElementById('btn-jump').ontouchstart = () => touchData.jump = true;
        }
    </script>
</body>
</html>
